var audioCtx=null;
function playTurnSound(){try{if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();var now=audioCtx.currentTime;[[523.25,0,0.15],[659.25,0.15,0.3],[783.99,0.3,0.55]].forEach(function(n){var o=audioCtx.createOscillator();var g=audioCtx.createGain();o.type="sine";o.frequency.value=n[0];g.gain.setValueAtTime(0.3,now+n[1]);g.gain.exponentialRampToValueAtTime(0.01,now+n[2]);o.connect(g);g.connect(audioCtx.destination);o.start(now+n[1]);o.stop(now+n[2]);});}catch(e){}}
function playWinSound(){try{if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();var now=audioCtx.currentTime;[523.25,659.25,783.99,1046.50].forEach(function(freq,i){var o=audioCtx.createOscillator();var g=audioCtx.createGain();o.type="triangle";o.frequency.value=freq;g.gain.setValueAtTime(0.25,now+i*0.12);g.gain.exponentialRampToValueAtTime(0.01,now+i*0.12+0.3);o.connect(g);g.connect(audioCtx.destination);o.start(now+i*0.12);o.stop(now+i*0.12+0.3);});}catch(e){}}

/* 🔔 Bip de urgência — toca um único bip curto e agudo */
function playUrgencyBeep(intensity){
  try{
    if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    var now=audioCtx.currentTime;
    var freq=intensity>1?1200:900; /* mais agudo quando crítico */
    var vol=intensity>1?0.35:0.22;
    var dur=intensity>1?0.06:0.09;
    var o=audioCtx.createOscillator();
    var g=audioCtx.createGain();
    o.type="square";
    o.frequency.value=freq;
    g.gain.setValueAtTime(vol,now);
    g.gain.exponentialRampToValueAtTime(0.001,now+dur);
    o.connect(g);g.connect(audioCtx.destination);
    o.start(now);o.stop(now+dur);
  }catch(e){}
}

/* ─── SETUP ─── */
function Setup(p){
  var s=useState,nm=s(""),av=s(AVS[0].id),rc=s(""),ld=s(false),er=s("");
  var name=nm[0],setName=nm[1],avatar=av[0],setAvatar=av[1],roomCode=rc[0],setRoomCode=rc[1],loading=ld[0],setLoading=ld[1],error=er[0],setError=er[1];
  var sa=s(false),showAv=sa[0],setShowAv=sa[1];
  function go(){
    if(!name.trim()){setError("Digite seu nome!");return;}
    setLoading(true);setError("");
    if(p.mode==="create"){
      var code=genCode();
      db.ref("rooms/"+code).once("value").then(function(snap){
        if(snap.exists())code=genCode();
        return db.ref("rooms/"+code).set({config:{status:"lobby",hostId:p.uid,createdAt:Date.now()},players:{}}).then(function(){
          return db.ref("rooms/"+code+"/players/"+p.uid).set({name:name.trim(),avatar:avatar,colorIdx:0,ready:false});
        }).then(function(){p.onReady(code);});
      }).catch(function(e){setError("Erro: "+e.message);setLoading(false);});
    }else{
      var c=roomCode.trim().toUpperCase();
      if(c.length<3||c.length>6){setError("Codigo deve ter 3 a 6 caracteres!");setLoading(false);return;}
      db.ref("rooms/"+c+"/config").once("value").then(function(snap){
        if(!snap.exists()){setError("Sala nao encontrada!");setLoading(false);return;}
        if(snap.val().status!=="lobby"){setError("Jogo ja comecou!");setLoading(false);return;}
        return db.ref("rooms/"+c+"/players").once("value").then(function(plSnap){
          var pls=plSnap.val()||{};
          var idx=Object.keys(pls).length;
          return db.ref("rooms/"+c+"/players/"+p.uid).set({name:name.trim(),avatar:avatar,colorIdx:idx%TC.length,ready:false});
        }).then(function(){p.onReady(c);});
      }).catch(function(e){setError("Erro: "+e.message);setLoading(false);});
    }
  }
  return h('div',{style:{maxWidth:500,margin:"0 auto",padding:"30px 20px"}},
    h('button',{onClick:p.onBack,style:{background:"none",border:"none",color:C.tm,cursor:"pointer",fontSize:"1rem",marginBottom:16}},"← Voltar"),
    h('h2',{style:{fontFamily:"'Lilita One',cursive",color:C.text,fontSize:"1.6rem",textAlign:"center",marginBottom:8}},p.mode==="create"?"🏠 Criar Sala":"🚪 Entrar na Sala"),
    h('div',{style:{background:C.sf,borderRadius:18,padding:24,border:"1px solid rgba(255,255,255,0.06)",animation:"scaleIn 0.3s ease"}},
      p.mode==="join"?h('div',{style:{marginBottom:16}},
        h('label',{style:{color:C.a2,fontFamily:"'Lilita One',cursive",fontSize:"0.9rem",display:"block",marginBottom:6}},"Codigo da Sala:"),
        h(Inp,{value:roomCode,onChange:function(v){setRoomCode(v.toUpperCase());},placeholder:"EX: ABC12",style:{textAlign:"center",fontSize:"1.5rem",fontFamily:"'Lilita One',cursive",letterSpacing:6}})
      ):null,
      h('div',{style:{display:"flex",gap:14,alignItems:"center",marginBottom:14}},
        h('button',{onClick:function(){setShowAv(!showAv);},style:{background:"none",border:"none",cursor:"pointer",position:"relative"}},
          h(Av,{id:avatar,size:70,style:{boxShadow:"0 0 0 3px "+C.a2}}),
          h('div',{style:{position:"absolute",bottom:-2,right:-2,width:22,height:22,borderRadius:"50%",background:C.a2,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"0.7rem",color:"#111"}},"✏️")
        ),
        h('div',{style:{flex:1}},h(Inp,{value:name,onChange:setName,placeholder:"Seu nome",onKeyDown:function(e){if(e.key==="Enter")go();},style:{fontSize:"1.4rem",fontFamily:"'Lilita One',cursive",padding:"16px 18px"}}))
      ),
      showAv?h('div',{style:{animation:"scaleIn 0.2s ease",marginBottom:14}},h(AvPicker,{selected:avatar,onSelect:function(a){setAvatar(a);setShowAv(false);},used:[]})):null,
      error?h('p',{style:{color:C.a1,fontSize:"0.9rem",marginBottom:10,textAlign:"center"}},error):null,
      h(Btn,{onClick:go,disabled:loading,color:p.mode==="create"?C.a2:C.a4,style:{width:"100%",fontSize:"1.15rem"},children:loading?h(Spinner):p.mode==="create"?"🎮 CRIAR SALA":"🚀 ENTRAR"})
    )
  );
}

function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}

function botFala(roomCode,botId,botName,texto){
  /* pequeno delay aleatório pra parecer mais humano */
  setTimeout(function(){
    db.ref("rooms/"+roomCode+"/chat").push({
      uid:botId,
      name:botName,
      avatar:"robot_nerd",
      colorIdx:1,
      text:texto,
      ts:Date.now(),
      isBot:true
    });
  },600+Math.random()*1200);
}

function addBot(roomCode,pls){
  var botId="bot_"+Date.now();
  var idx=Object.keys(pls).length;
  var botName=BOT_NAMES[Math.floor(Math.random()*BOT_NAMES.length)];
  db.ref("rooms/"+roomCode+"/players/"+botId).set({name:botName,avatar:"robot_nerd",colorIdx:idx%TC.length,ready:false,isBot:true});
  /* fala ao entrar */
  botFala(roomCode,botId,botName,pick(BOT_FALAS.entrou));
  return botId;
}

function botPickSecret(roomCode,botId,botName){
  var secret=Math.floor(Math.random()*101);
  db.ref("rooms/"+roomCode+"/players/"+botId+"/secret").set(secret);
  db.ref("rooms/"+roomCode+"/players/"+botId+"/ready").set(true);
}

function botGuess(roomCode,mi,game,mHistory,pls,defenderUid,guesserUid){
  var botData=pls[guesserUid]||{};
  var botName=botData.name||"Bot";
  var myH=(mHistory||[]).filter(function(x){return x.uid===guesserUid;});
  var lo=0,hi=100;
  myH.forEach(function(g){
    if(g.result==="mais"&&g.guess>=lo)lo=g.guess+1;
    if(g.result==="menos"&&g.guess<=hi)hi=g.guess-1;
  });

  /* ── Imperfeição humana do robô ──
     Ele NÃO usa bisect sempre. Às vezes chuta aleatório dentro da faixa,
     às vezes erra a faixa por besteira, às vezes repete número próximo.
     Quanto mais rodadas, mais ele "aprende" e acerta melhor — igual humano. */
  var range=hi-lo;
  var roll=Math.random();
  var guess;

  if(myH.length===0){
    /* Primeiro chute: totalmente aleatório entre 10 e 90, ignora bisect */
    guess=10+Math.floor(Math.random()*81);
  } else if(roll<0.20){
    /* 20%: chuta completamente aleatório dentro da faixa válida (distraído) */
    guess=lo+Math.floor(Math.random()*(range+1));
  } else if(roll<0.38){
    /* 18%: chuta próximo do último chute com pequena variação (preguiça) */
    var last=myH[myH.length-1].guess;
    var nudge=Math.floor(Math.random()*12)-6;
    guess=Math.max(lo,Math.min(hi,last+nudge));
  } else if(roll<0.52&&range>20){
    /* 14%: chuta no terço errado da faixa (erro de julgamento) */
    var third=Math.floor(range/3);
    guess=lo+third+Math.floor(Math.random()*third);
  } else {
    /* 48%: bisect com erro de ±8 (razoável mas imperfeito) */
    var mid=Math.floor((lo+hi)/2);
    var jitter=Math.floor(Math.random()*17)-8;
    guess=Math.max(lo,Math.min(hi,mid+jitter));
  }

  var secret=pls[defenderUid]?pls[defenderUid].secret:null;
  var result=guess===secret?"acertou":guess>secret?"menos":"mais";
  var entry={uid:guesserUid,guess:guess,result:result,round:game.round||1};
  var round=game.round||1;

  db.ref("rooms/"+roomCode+"/history/"+mi).set((mHistory||[]).concat([entry]));

  /* 🗣️ Fala após o chute */
  var fala=null;
  if(result==="acertou"){
    fala=pick(BOT_FALAS.botAcertou).replace("{num}",guess);
  } else {
    if(round>=4&&Math.random()<0.5){
      fala=pick(BOT_FALAS.muitasRodadas).replace("{round}",round);
    } else if(myH.length===0){
      if(Math.random()<0.6)fala=pick(BOT_FALAS.vaiChutar);
    }
  }
  if(fala)botFala(roomCode,guesserUid,botName,fala);

  if(result==="acertou"){
    db.ref("rooms/"+roomCode+"/winners/"+mi).set(guesserUid);
  }else{
    var newTurn=1-(game.turn||0);
    var upd={turn:newTurn};
    if(newTurn===0)upd.round=(game.round||1)+1;
    db.ref("rooms/"+roomCode+"/game").update(upd);
  }
}

/* Reage ao chute de humano (chamado pelo MatchScreen) */
function botReactToHumanGuess(roomCode,botId,botName,isDefender,guess,result,secret,round){
  if(Math.random()>0.65)return; /* não comenta sempre, pra não encher */
  var fala=null;
  if(isDefender){
    /* humano tentando adivinhar o número do bot */
    if(result==="acertou"){
      fala=pick(BOT_FALAS.descobriuMeuNum).replace("{num}",secret);
    } else {
      var dist=Math.abs(guess-secret);
      if(dist>35&&Math.random()<0.5){
        fala=pick(BOT_FALAS.errouFeio).replace(/{dist}/g,dist);
      } else if(dist<=8&&Math.random()<0.6){
        fala=pick(BOT_FALAS.quaseDescobriu);
      }
    }
  } else {
    /* humano tentando adivinhar contra outro humano, bot é espectador zueiro */
    if(result==="acertou"){
      fala=pick(BOT_FALAS.humanoAcertou);
    } else {
      var dist2=Math.abs(guess-secret);
      if(dist2>35&&Math.random()<0.45){
        fala=pick(BOT_FALAS.errouFeio).replace(/{dist}/g,dist2);
      } else if(dist2<=8&&Math.random()<0.5){
        fala=pick(BOT_FALAS.errouPouco).replace(/{dist}/g,dist2);
      }
    }
  }
  if(fala)botFala(roomCode,botId,botName,fala);
}

/* ─── MATCH ─── */
function MatchScreen(p){
  var rd=p.roomData,pls=rd?rd.players||{}:{},game=rd?rd.game||{}:{},history=rd?rd.history||{}:{},winners=rd?rd.winners||{}:{};
  var gi=useState(""),nt=useState([]),nn=useState(""),sn=useState(false),sc=useState(false),hn=useState("");
  var guessInput=gi[0],setGuessInput=gi[1],notes=nt[0],setNotes=nt[1],newNote=nn[0],setNewNote=nn[1],showNotes=sn[0],setShowNotes=sn[1],showConf=sc[0],setShowConf=sc[1],hint=hn[0],setHint=hn[1];
  /* ⏱️ Countdown */
  var TIMER_SECS=30;
  var cd=useState(TIMER_SECS),beeping=useState(false);
  var countdown=cd[0],setCountdown=cd[1],isBeeping=beeping[0],setIsBeeping=beeping[1];
  var beepRef=useRef(null);
  var prevRef=useRef(null);
  var matchups=game.matchups||[],mi=game.currentMatch||0,match=matchups[mi];
  var isHost=rd&&rd.config&&rd.config.hostId===p.uid;

  var defenderUid=match?match[1-(game.turn||0)]:null;
  var guesser=pls[guesserUid]||{};
  var currentWinner=winners[mi];
  var isMyTurn=guesserUid===p.uid;

  /* Para o bip e reseta helper */
  function stopBeep(){
    if(beepRef.current){clearInterval(beepRef.current);beepRef.current=null;}
    setIsBeeping(false);
    setCountdown(TIMER_SECS);
  }

  useEffect(function(){
    var key=mi+"-"+(game.turn||0)+"-"+(game.round||1);
    if(prevRef.current!==key){
      setHint("");setGuessInput("");
      stopBeep();
      if(prevRef.current!==null&&isMyTurn&&!currentWinner)playTurnSound();
      prevRef.current=key;
    }
  },[mi,game.turn,game.round]);

  useEffect(function(){if(winners[mi]){setShowConf(true);playWinSound();stopBeep();setTimeout(function(){setShowConf(false);},5000);}},[winners[mi]]);

  /* ⏱️ Countdown tick — só roda quando é a VEZ do jogador atual (humano) */
  useEffect(function(){
    if(!isMyTurn||currentWinner||!match)return;
    setCountdown(TIMER_SECS);
    stopBeep();
    var tick=setInterval(function(){
      setCountdown(function(prev){
        var next=prev-1;
        if(next<=0){
          /* Chegou a zero: inicia bip contínuo */
          if(!beepRef.current){
            setIsBeeping(true);
            playUrgencyBeep(2);
            beepRef.current=setInterval(function(){playUrgencyBeep(2);},400);
          }
          return 0;
        }
        if(next<=5){
          /* Últimos 5s: bip simples a cada segundo */
          playUrgencyBeep(1);
        }
        return next;
      });
    },1000);
    return function(){clearInterval(tick);stopBeep();};
  },[isMyTurn,mi,game.turn,game.round,currentWinner]);

  // ✅ Bot auto-guess — espera entre 5s e 14s igual humano pensando
  var botCd=useState(0);
  var botCountdown=botCd[0],setBotCountdown=botCd[1];
  var botTimerRef=useRef(null);

  useEffect(function(){
    if(!match||currentWinner)return;
    var gUid=match[game.turn||0];
    var gPlayer=pls[gUid];
    if(!gPlayer||!gPlayer.isBot||!isHost)return;
    var dUid=match[1-(game.turn||0)];
    var mHist=history[mi]||[];

    /* Tempo de "reflexão" do bot: 5s a 14s */
    var waitSecs=5+Math.floor(Math.random()*10);
    setBotCountdown(waitSecs);

    /* tick de countdown visual do bot */
    var tick=setInterval(function(){
      setBotCountdown(function(prev){return prev>0?prev-1:0;});
    },1000);

    var timer=setTimeout(function(){
      clearInterval(tick);
      setBotCountdown(0);
      botGuess(p.roomCode,mi,game,mHist,pls,dUid,gUid);
    },waitSecs*1000);

    return function(){clearTimeout(timer);clearInterval(tick);setBotCountdown(0);};
  },[mi,game.turn,game.round,currentWinner]);

  // 🤖 Bot zoando humano que demora
  useEffect(function(){
    if(!match||currentWinner)return;
    var gUid=match[game.turn||0];
    var gPlayer=pls[gUid];
    if(gPlayer&&gPlayer.isBot)return; /* é turno do bot, não do humano */
    /* acha algum bot na sala */
    var botEntry=null;
    Object.keys(pls).forEach(function(pid){if(pls[pid].isBot)botEntry={id:pid,data:pls[pid]};});
    if(!botEntry||!isHost)return;
    var taunt=setTimeout(function(){
      if(Math.random()<0.6){
        botFala(p.roomCode,botEntry.id,botEntry.data.name,pick(BOT_FALAS.demorando));
      }
    },18000+Math.random()*6000);
    return function(){clearTimeout(taunt);};
  },[mi,game.turn,game.round,currentWinner]);

  if(!match)return h(ResultsScreen,{roomCode:p.roomCode,roomData:rd,uid:p.uid});

  var defender=pls[defenderUid]||{};
  var tg=TC[guesser.colorIdx||0],td=TC[defender.colorIdx||0];
  var mHistory=history[mi]||[];
  var myHistory=mHistory.filter(function(x){return x.uid===p.uid;});
  var amInMatch=match.indexOf(p.uid)!==-1;

  function submitGuess(){
    var n=parseInt(guessInput);if(isNaN(n)||n<0||n>100)return;
    stopBeep(); /* ⏱️ para o bip ao jogar */
    var secret=pls[defenderUid]?pls[defenderUid].secret:null;
    var result;
    if(n===secret)result="acertou";
    else if(n>secret){result="menos";setHint("O numero e menor que "+n);}
    else{result="mais";setHint("O numero e maior que "+n);}
    var entry={uid:guesserUid,guess:n,result:result,round:game.round||1};
    db.ref("rooms/"+p.roomCode+"/history/"+mi).set(mHistory.concat([entry]));
    setGuessInput("");

    /* 🤖 Robô reage ao chute do humano */
    Object.keys(pls).forEach(function(pid){
      var pl=pls[pid];
      if(!pl.isBot)return;
      var isDefender=pid===defenderUid;
      /* só reage se está no match ou é espectador */
      botReactToHumanGuess(p.roomCode,pid,pl.name,isDefender,n,result,secret,game.round||1);
    });

    if(result==="acertou")db.ref("rooms/"+p.roomCode+"/winners/"+mi).set(guesserUid);
    else{var nt=1-(game.turn||0);var upd={turn:nt};if(nt===0)upd.round=(game.round||1)+1;db.ref("rooms/"+p.roomCode+"/game").update(upd);}
  }
  function nextMatch(){var nm=mi+1;if(nm>=matchups.length)db.ref("rooms/"+p.roomCode+"/config/status").set("results");else db.ref("rooms/"+p.roomCode+"/game").update({currentMatch:nm,turn:0,round:1});}
  function addNote(){if(!newNote.trim())return;setNotes(notes.concat([{text:newNote.trim(),round:game.round||1}]));setNewNote("");}

  if(currentWinner){
    var w=pls[currentWinner]||{},tw=TC[w.colorIdx||0],secret=pls[defenderUid]?pls[defenderUid].secret:"?";

function ResultsScreen(p){
  var rd=p.roomData,pls=rd?rd.players||{}:{},history=rd?rd.history||{}:{},winners=rd?rd.winners||{}:{};

  var isHost=rd&&rd.config&&rd.config.hostId===p.uid;

    var pl=pls[pid],totalGuesses=0,wins=0;
    Object.values(history).forEach(function(mh){var mine=(mh||[]).filter(function(x){return x.uid===pid;});totalGuesses+=mine.length;});
    Object.values(winners).forEach(function(w){if(w===pid)wins++;});

/* ══════════════════════════════════════════
   💬 BALÕES DE FALA — mensagens aparecem na tela do jogo
   ══════════════════════════════════════════ */
function SpeechBubbles(p){
  var bs=useState([]);
  var bubbles=bs[0],setBubbles=bs[1];
  var seenRef=useRef({});
  useEffect(function(){
    if(!p.roomCode)return;
    var ref=db.ref("rooms/"+p.roomCode+"/chat");
    var cb=ref.limitToLast(3).on("child_added",function(snap){
      var msg=snap.val();var id=snap.key;
      if(!msg||seenRef.current[id])return;
      seenRef.current[id]=true;
      /* ignora mensagens antigas (mais de 6s) */
      if(Date.now()-msg.ts>6000)return;
      var bubble={id:id,name:msg.name,avatar:msg.avatar,text:msg.text,colorIdx:msg.colorIdx||0,isBot:!!msg.isBot,isMe:msg.uid===p.uid,born:Date.now()};
      setBubbles(function(prev){return prev.concat([bubble]).slice(-3);});
      /* auto-remove após 4.5s */
      setTimeout(function(){
        setBubbles(function(prev){return prev.filter(function(b){return b.id!==id;});});
      },4500);
    });
    return function(){ref.off("child_added",cb);};
  },[p.roomCode]);

  if(bubbles.length===0)return null;
  return h('div',{style:{position:"fixed",top:10,left:"50%",transform:"translateX(-50%)",zIndex:900,display:"flex",flexDirection:"column",gap:6,alignItems:"center",pointerEvents:"none",maxWidth:"92vw",width:400}},
    bubbles.map(function(b){
      var tc=TC[b.colorIdx||0];
      var age=Date.now()-b.born;
      var fading=age>3800;
      return h('div',{key:b.id,style:{
        display:"flex",alignItems:"center",gap:8,
        padding:"8px 14px",borderRadius:16,
        background:b.isBot?"rgba(107,255,242,0.15)":"rgba(0,0,0,0.75)",
        border:b.isBot?"1px solid rgba(107,255,242,0.3)":"1px solid "+tc.s+"44",
        backdropFilter:"blur(12px)",WebkitBackdropFilter:"blur(12px)",
        boxShadow:"0 4px 20px rgba(0,0,0,0.4)",
        animation:fading?"bubbleOut 0.4s ease forwards":"bubbleIn 0.3s ease",
        maxWidth:"100%"
      }},
        h(Av,{id:b.avatar,size:28,style:{border:"2px solid "+(b.isBot?"#6bfff2":tc.s),flexShrink:0}}),
        h('div',{style:{minWidth:0}},
          h('div',{style:{fontSize:"0.6rem",fontFamily:"'Lilita One',cursive",color:b.isBot?"#6bfff2":tc.s,lineHeight:1}},b.name+(b.isBot?" 🤖":"")),
          h('div',{style:{fontSize:"0.82rem",color:"#fff",lineHeight:1.3,wordBreak:"break-word",fontStyle:b.isBot?"italic":"normal",marginTop:2}},b.text)
        )
      );
    })
  );
}

    );
  }

  /* ── MOBILE: painel compacto embaixo — NÃO cobre o jogo ── */
  if(isMobile){
    return h(React.Fragment,null,
      /* painel compacto — sem overlay, jogo continua visível */
      isOpen?h('div',{style:{position:"fixed",bottom:0,left:0,right:0,zIndex:1001,borderRadius:"18px 18px 0 0",border:"1px solid rgba(255,255,255,0.12)",boxShadow:"0 -4px 30px rgba(0,0,0,0.6)",overflow:"hidden",animation:"slideUp 0.2s ease",background:C.card}},
        /* mini header com X */
        h('div',{style:{padding:"8px 14px",background:"linear-gradient(135deg,rgba(255,107,107,0.12),rgba(77,150,255,0.12))",borderBottom:"1px solid rgba(255,255,255,0.06)",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}},
          h('div',{style:{display:"flex",alignItems:"center",gap:6}},
            h('span',{style:{fontSize:"0.9rem"}},"💬"),
            h('span',{style:{fontFamily:"'Lilita One',cursive",color:"#fff",fontSize:"0.85rem"}},"Chat")
          ),
          h('button',{onClick:function(){setIsOpen(false);},style:{background:"rgba(255,255,255,0.08)",border:"none",color:"#fff",cursor:"pointer",fontSize:"0.85rem",borderRadius:"50%",width:28,height:28,display:"flex",alignItems:"center",justifyContent:"center"}},"✕")
        ),
        /* últimas mensagens — altura fixa compacta */
        h('div',{ref:scroll,style:{maxHeight:120,overflowY:"auto",padding:"6px 10px",display:"flex",flexDirection:"column",gap:4}},
          messages.slice(-4).map(function(msg){
            var isMe=msg.uid===myUid;var tc=TC[msg.colorIdx||0];
            var isRobot=msg.isBot;
            return h('div',{key:msg.id,style:{display:"flex",flexDirection:isMe?"row-reverse":"row",alignItems:"center",gap:5}},
              h(Av,{id:msg.avatar,size:22,style:{flexShrink:0,border:"1.5px solid "+(isRobot?"#6bfff2":tc.s)}}),
              h('div',{style:{padding:"5px 10px",borderRadius:10,background:isMe?tc.bg:isRobot?"rgba(107,255,242,0.10)":"rgba(255,255,255,0.07)",color:"#fff",fontSize:"0.78rem",lineHeight:1.3,wordBreak:"break-word",fontStyle:isRobot?"italic":"normal",maxWidth:"75%"}},msg.text)
            );
          })
        ),
        /* input */
        h('div',{style:{padding:"8px 10px",borderTop:"1px solid rgba(255,255,255,0.06)",display:"flex",gap:6,alignItems:"center",paddingBottom:"max(8px,env(safe-area-inset-bottom))"}},
          h('input',{value:input,onChange:function(e){setInput(e.target.value);},onKeyDown:function(e){if(e.key==="Enter")sendMsg();},placeholder:"Mensagem...",maxLength:200,style:{flex:1,padding:"9px 12px",borderRadius:10,border:"1px solid rgba(255,255,255,0.1)",background:"rgba(255,255,255,0.06)",color:"#fff",fontSize:"0.85rem",fontFamily:"'Nunito',sans-serif",outline:"none"},onFocus:function(e){e.target.style.borderColor=C.a4;},onBlur:function(e){e.target.style.borderColor="rgba(255,255,255,0.1)";}}),
          h('button',{onClick:sendMsg,disabled:!input.trim(),style:{width:36,height:36,borderRadius:10,border:"none",background:input.trim()?C.a4:"rgba(255,255,255,0.08)",color:input.trim()?"#fff":C.tm,cursor:input.trim()?"pointer":"default",fontSize:"1rem",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}},"➤")
        )
      ):null,
      /* botão flutuante canto inferior direito */
      !isOpen?h('div',{style:{position:"fixed",bottom:"max(20px, calc(env(safe-area-inset-bottom) + 8px))",right:16,zIndex:1003}},toggleBtn):null
    );
  }

  /* ── DESKTOP: painel flutuante ── */
  return h('div',{style:{position:"fixed",bottom:20,right:16,zIndex:1003,display:"flex",flexDirection:"column",alignItems:"flex-end"}},
    isOpen?h('div',{style:{width:320,borderRadius:20,border:"1px solid rgba(255,255,255,0.1)",boxShadow:"0 8px 40px rgba(0,0,0,0.7)",marginBottom:10,overflow:"hidden",animation:"slideUp 0.2s ease"}},
      renderPanel(280)
    ):null,
    toggleBtn
  );
}

/* ═══ THEME PICKER ═══ */
function ThemePicker(p){
  var isMobile=window.innerWidth<=520;
  function pick(t){
    applyTheme(t);
    p.onSelect(t);
  }
  var panel=h('div',{style:{background:p.current.card,borderRadius:20,border:"1px solid rgba(255,255,255,0.12)",boxShadow:"0 8px 40px rgba(0,0,0,0.7)",overflow:"hidden",animation:"slideUp 0.25s ease",maxHeight:isMobile?"75vh":"auto"}},
    /* header */
    h('div',{style:{padding:"14px 16px",background:"linear-gradient(135deg,rgba(255,217,61,0.15),rgba(255,107,255,0.15))",borderBottom:"1px solid rgba(255,255,255,0.06)",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}},
      h('div',{style:{display:"flex",alignItems:"center",gap:8}},
        h('span',{style:{fontSize:"1.2rem"}},"🎨"),
        h('span',{style:{fontFamily:"'Lilita One',cursive",color:"#fff",fontSize:"1.05rem"}},"Tema da Tela")
      ),
      h('button',{onClick:p.onClose,style:{background:"rgba(255,255,255,0.08)",border:"none",color:"#fff",cursor:"pointer",fontSize:"1rem",borderRadius:"50%",width:32,height:32,display:"flex",alignItems:"center",justifyContent:"center"}},"✕")
    ),
    /* grid de temas */
    h('div',{style:{padding:"14px 16px",display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:10,overflowY:"auto",maxHeight:isMobile?"65vh":340}},
      THEMES.map(function(t){
        var sel=p.current.id===t.id;
        return h('button',{key:t.id,onClick:function(){pick(t);},style:{
          display:"flex",alignItems:"center",gap:10,padding:"12px 14px",borderRadius:14,
          border:sel?"2px solid "+C.a2:"2px solid rgba(255,255,255,0.08)",
          background:t.bg,cursor:"pointer",transition:"all 0.25s",
          boxShadow:sel?"0 0 20px "+C.a2+"44":"none",
          transform:sel?"scale(1.03)":"scale(1)"
        }},
          /* preview circle */
          h('div',{style:{width:38,height:38,borderRadius:"50%",background:t.card,border:"2px solid rgba(255,255,255,0.15)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.1rem",flexShrink:0}},t.emoji),
          h('div',{style:{textAlign:"left"}},
            h('div',{style:{fontFamily:"'Lilita One',cursive",color:"#fff",fontSize:"0.85rem",lineHeight:1.2}},t.name),
            sel?h('div',{style:{fontSize:"0.65rem",color:C.a2,fontWeight:700,marginTop:2}},"✓ ATIVO"):null
          )
        );
      })
    )
  );

  if(isMobile){
    return h(React.Fragment,null,
      h('div',{onClick:p.onClose,style:{position:"fixed",inset:0,background:"rgba(0,0,0,0.55)",zIndex:2000,animation:"fadeUp 0.2s ease"}}),
      h('div',{style:{position:"fixed",top:"max(56px, calc(env(safe-area-inset-top) + 48px))",left:8,right:8,zIndex:2001}},panel)
    );
  }
  return h(React.Fragment,null,
    h('div',{onClick:p.onClose,style:{position:"fixed",inset:0,background:"rgba(0,0,0,0.55)",zIndex:2000,animation:"fadeUp 0.2s ease"}}),
    h('div',{style:{position:"fixed",bottom:90,left:16,zIndex:2001,width:340}},panel)
  );
}

/* ─── APP ─── */
function App(){
  var uid=useState(null),scr=useState("welcome"),sm=useState(null),rc=useState(null),rd=useState(null),ar=useState(false);
  var myUid=uid[0],setUid=uid[1],screen=scr[0],setScreen=scr[1],setupMode=sm[0],setSetupMode=sm[1],roomCode=rc[0],setRoomCode=rc[1],roomData=rd[0],setRoomData=rd[1],authReady=ar[0],setAuthReady=ar[1];
  /* ═══ TEMA ═══ */
  var th=useState(_currentTheme),tp=useState(false);
  var theme=th[0],setTheme=th[1],themeOpen=tp[0],setThemeOpen=tp[1];
  function handleThemeSelect(t){setTheme(t);/* forçar re-render já que C mutou */}
  useEffect(function(){auth.onAuthStateChanged(function(user){if(user){setUid(user.uid);setAuthReady(true);}else auth.signInAnonymously();});},[]);
  useEffect(function(){if(!roomCode)return;var ref=db.ref("rooms/"+roomCode);var cb=ref.on("value",function(snap){var data=snap.val();if(data)setRoomData(data);});return function(){ref.off("value",cb);};},[roomCode]);
  useEffect(function(){if(!authReady)return;var saved=sessionStorage.getItem("advinha_room");if(saved){setRoomCode(saved);setScreen("room");}},[authReady]);
  useEffect(function(){if(roomCode)sessionStorage.setItem("advinha_room",roomCode);},[roomCode]);
  function handleRoomReady(code){setRoomCode(code);setScreen("room");}
  function handleLeave(){if(roomCode&&myUid)db.ref("rooms/"+roomCode+"/players/"+myUid).remove();setRoomCode(null);setRoomData(null);setScreen("welcome");sessionStorage.removeItem("advinha_room");}
  if(!authReady)return h('div',{style:{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center"}},h(Spinner));
  var status=roomData&&roomData.config?roomData.config.status:null;
  return h('div',{style:{minHeight:"100vh",minHeight:"100dvh",background:C.bg,position:"relative"}},
    h(Orbs,{theme:theme}),
    h('div',{style:{position:"relative",zIndex:1,paddingBottom:90}},
      screen==="welcome"?h(Welcome,{onCreateRoom:function(){setSetupMode("create");setScreen("setup");},onJoinRoom:function(){setSetupMode("join");setScreen("setup");}}):null,
      screen==="setup"?h(Setup,{mode:setupMode,uid:myUid,onReady:handleRoomReady,onBack:function(){setScreen("welcome");}}):null,
      screen==="room"?h(React.Fragment,null,
        roomCode?h('div',{style:{textAlign:"right",padding:"8px 16px 0"}},h('button',{onClick:handleLeave,style:{background:"none",border:"none",color:C.tm,cursor:"pointer",fontSize:"0.8rem"}},"🚪 Sair")):null,
        (!status||status==="lobby")?h(Lobby,{roomCode:roomCode,roomData:roomData,uid:myUid}):null,
        status==="secrets"?h(SecretScreen,{roomCode:roomCode,roomData:roomData,uid:myUid}):null,
        status==="playing"?h(MatchScreen,{roomCode:roomCode,roomData:roomData,uid:myUid}):null,
        status==="results"?h(ResultsScreen,{roomCode:roomCode,roomData:roomData,uid:myUid}):null
      ):null
    ),
    /* Chat e botões flutuantes ficam FORA do container de scroll — fix mobile */
    screen==="room"&&roomCode&&myUid?h(SpeechBubbles,{roomCode:roomCode,uid:myUid}):null,
    screen==="room"&&roomCode&&myUid?h(ChatPanel,{roomCode:roomCode,uid:myUid,players:roomData?roomData.players||{}:{}}):null,
    /* 🎨 Botão flutuante de tema — top-left no mobile, bottom-left no desktop */
    h('div',{style:{position:"fixed",bottom:window.innerWidth<=520?"auto":"max(20px, calc(env(safe-area-inset-bottom) + 8px))",top:window.innerWidth<=520?"max(12px, calc(env(safe-area-inset-top) + 4px))":"auto",left:16,zIndex:1003}},
      h('button',{onClick:function(){setThemeOpen(!themeOpen);},style:{
        width:48,height:48,borderRadius:"50%",border:"none",
        background:"linear-gradient(135deg,#ffd93d,#ff6bff)",
        color:"#fff",fontSize:"1.3rem",cursor:"pointer",
        boxShadow:"0 4px 20px rgba(255,107,255,0.4)",
        display:"flex",alignItems:"center",justifyContent:"center",
        transition:"transform 0.2s",
        WebkitTapHighlightColor:"transparent"
      },
      onMouseEnter:function(e){e.currentTarget.style.transform="scale(1.12)";},
      onMouseLeave:function(e){e.currentTarget.style.transform="scale(1)";}
      },"🎨")
    ),
    themeOpen?h(ThemePicker,{current:theme,onSelect:handleThemeSelect,onClose:function(){setThemeOpen(false);}}):null
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
</body>
</html>
