  var name=nm[0],setName=nm[1],avatar=av[0],setAvatar=av[1],roomCode=rc[0],setRoomCode=rc[1],loading=ld[0],setLoading=ld[1],error=er[0],setError=er[1];
  var sa=s(false),showAv=sa[0],setShowAv=sa[1];

  function go(){
    if(!name.trim()){setError("Digite seu nome!");return;}
    setLoading(true);setError("");
    if(p.mode==="create"){
      var code=genCode();
      db.ref("rooms/"+code).once("value").then(function(snap){
        if(snap.exists()){code=genCode();}
        return db.ref("rooms/"+code).set({
          config:{status:"lobby",hostId:p.uid,createdAt:Date.now()},
          players:{}
        }).then(function(){
          return db.ref("rooms/"+code+"/players/"+p.uid).set({name:name.trim(),avatar:avatar,colorIdx:0,ready:false});
        }).then(function(){p.onReady(code);});
      }).catch(function(e){setError("Erro: "+e.message);setLoading(false);});
    } else {
      var c=roomCode.trim().toUpperCase();
      if(c.length!==5){setError("Codigo deve ter 5 caracteres!");setLoading(false);return;}
      db.ref("rooms/"+c+"/config").once("value").then(function(snap){
        if(!snap.exists()){setError("Sala nao encontrada!");setLoading(false);return;}
        if(snap.val().status!=="lobby"){setError("Jogo ja comecou!");setLoading(false);return;}
        return db.ref("rooms/"+c+"/players").once("value").then(function(plSnap){
          var pls=plSnap.val()||{};
          var idx=Object.keys(pls).length;
          return db.ref("rooms/"+c+"/players/"+p.uid).set({name:name.trim(),avatar:avatar,colorIdx:idx%TC.length,ready:false});
        }).then(function(){p.onReady(c);});
      }).catch(function(e){setError("Erro: "+e.message);setLoading(false);});
    }
  }

  return h('div',{style:{maxWidth:500,margin:"0 auto",padding:"30px 20px"}},
    h('button',{onClick:p.onBack,style:{background:"none",border:"none",color:C.tm,cursor:"pointer",fontSize:"1rem",marginBottom:16}},"← Voltar"),
    h('h2',{style:{fontFamily:"'Lilita One',cursive",color:C.text,fontSize:"1.6rem",textAlign:"center",marginBottom:8}},p.mode==="create"?"🏠 Criar Sala":"🚪 Entrar na Sala"),
    h('div',{style:{background:C.sf,borderRadius:18,padding:24,border:"1px solid rgba(255,255,255,0.06)",animation:"scaleIn 0.3s ease"}},
      p.mode==="join"?h('div',{style:{marginBottom:16}},
        h('label',{style:{color:C.a2,fontFamily:"'Lilita One',cursive",fontSize:"0.9rem",display:"block",marginBottom:6}},"Codigo da Sala:"),
        h(Inp,{value:roomCode,onChange:function(v){setRoomCode(v.toUpperCase());},placeholder:"EX: ABC12",style:{textAlign:"center",fontSize:"1.5rem",fontFamily:"'Lilita One',cursive",letterSpacing:6}})
      ):null,
      h('div',{style:{display:"flex",gap:14,alignItems:"center",marginBottom:14}},
        h('button',{onClick:function(){setShowAv(!showAv);},style:{background:"none",border:"none",cursor:"pointer",position:"relative"}},
          h(Av,{id:avatar,size:70,style:{boxShadow:"0 0 0 3px "+C.a2}}),
          h('div',{style:{position:"absolute",bottom:-2,right:-2,width:22,height:22,borderRadius:"50%",background:C.a2,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"0.7rem",color:"#111"}},"✏️")
        ),
        h('div',{style:{flex:1}},h(Inp,{value:name,onChange:setName,placeholder:"Seu nome",onKeyDown:function(e){if(e.key==="Enter")go();}}))
      ),
      showAv?h('div',{style:{animation:"scaleIn 0.2s ease",marginBottom:14}},h(AvPicker,{selected:avatar,onSelect:function(a){setAvatar(a);setShowAv(false);},used:[]})):null,
      error?h('p',{style:{color:C.a1,fontSize:"0.9rem",marginBottom:10,textAlign:"center"}},error):null,
      h(Btn,{onClick:go,disabled:loading,color:p.mode==="create"?C.a2:C.a4,style:{width:"100%",fontSize:"1.15rem"},children:loading?h(Spinner):p.mode==="create"?"🎮 CRIAR SALA":"🚀 ENTRAR"})
    )
  );
}

/* ─── LOBBY ─── */
function Lobby(p){
  var rd=p.roomData;
  if(!rd)return h('div',{style:{textAlign:"center",padding:60}},h(Spinner));
  var cfg=rd.config||{},pls=rd.players||{};
  var plList=Object.keys(pls).map(function(k){return{uid:k,data:pls[k]};});
  var isHost=cfg.hostId===p.uid;

  function startGame(){
    if(plList.length<2)return;
    db.ref("rooms/"+p.roomCode+"/config/status").set("secrets");
  }

  return h('div',{style:{maxWidth:500,margin:"0 auto",padding:"30px 20px",textAlign:"center"}},
    h('div',{style:{background:"linear-gradient(135deg,"+C.a2+"22,"+C.a4+"22)",borderRadius:18,padding:"16px 20px",marginBottom:24,border:"1px solid "+C.a2+"33"}},
      h('p',{style:{color:C.tm,fontSize:"0.85rem",marginBottom:4}},"Codigo da Sala:"),
      h('div',{style:{fontFamily:"'Lilita One',cursive",fontSize:"2.4rem",color:C.a2,letterSpacing:8}},p.roomCode),
      h('p',{style:{color:C.tm,fontSize:"0.8rem",marginTop:4}},"Compartilhe este codigo com os jogadores!")
    ),
    h('h3',{style:{fontFamily:"'Lilita One',cursive",color:C.text,fontSize:"1.2rem",marginBottom:16}},"👥 Jogadores ("+plList.length+")"),
    h('div',{style:{display:"flex",flexDirection:"column",gap:10,marginBottom:24}},
      plList.map(function(pl,i){
        var tc=TC[pl.data.colorIdx||0];
        return h('div',{key:pl.uid,style:{display:"flex",alignItems:"center",gap:12,padding:"12px 16px",borderRadius:14,background:tc.bg,boxShadow:"0 4px 15px "+tc.glow,animation:"fadeUp 0.3s "+(i*0.08)+"s both"}},
          h(Av,{id:pl.data.avatar,size:44,style:{border:"2px solid rgba(255,255,255,0.3)"}}),
          h('span',{style:{flex:1,fontFamily:"'Lilita One',cursive",color:"#fff",fontSize:"1.05rem",textAlign:"left"}},pl.data.name),
          pl.uid===cfg.hostId?h(Badge,{color:C.a2,children:"HOST"}):null,
          pl.uid===p.uid&&pl.uid!==cfg.hostId?h(Badge,{color:C.a3,children:"VOCE"}):null
        );
      })
    ),
    plList.length<2?h('div',{style:{background:C.sf,borderRadius:12,padding:"14px",marginBottom:20,border:"1px solid rgba(255,255,255,0.06)"}},
      h('p',{style:{color:C.tm,fontSize:"0.9rem",animation:"pulse 2s infinite"}},"⏳ Aguardando mais jogadores...")
    ):null,
    isHost?h(Btn,{onClick:startGame,disabled:plList.length<2,color:C.a2,style:{width:"100%",fontSize:"1.2rem",padding:"16px"},children:plList.length>=2?"🚀 INICIAR JOGO":"Minimo 2 jogadores"}):
      h('div',{style:{background:C.sf,borderRadius:14,padding:"18px",border:"1px solid rgba(255,255,255,0.06)"}},
        h('p',{style:{color:C.a2,fontFamily:"'Lilita One',cursive",animation:"pulse 2s infinite"}},"⏳ Aguardando o host iniciar..."))
  );
}

/* ─── SECRET ─── */
function SecretScreen(p){
  var rd=p.roomData,pls=rd?rd.players||{}:{},me=pls[p.uid];
  var si=useState(""),rev=useState(false),er=useState(""),sub=useState(false);
  var secretInput=si[0],setSecretInput=si[1],revealed=rev[0],setRevealed=rev[1],error=er[0],setError=er[1],submitted=sub[0],setSubmitted=sub[1];
  var plList=Object.keys(pls).map(function(k){return{uid:k,data:pls[k]};});
  var allReady=plList.every(function(pl){return pl.data.ready;});
  var isHost=rd&&rd.config&&rd.config.hostId===p.uid;
  var readyCount=plList.filter(function(pl){return pl.data.ready;}).length;

  useEffect(function(){if(me&&me.ready)setSubmitted(true);},[me&&me.ready]);

  useEffect(function(){
    if(!allReady||!isHost||plList.length<2)return;
    var uids=plList.map(function(pl){return pl.uid;});
    var matchups=[];
    for(var i=0;i<uids.length;i++)for(var j=i+1;j<uids.length;j++)matchups.push([uids[i],uids[j]]);
    db.ref("rooms/"+p.roomCode+"/game").set({matchups:matchups,currentMatch:0,turn:0,round:1});
    db.ref("rooms/"+p.roomCode+"/config/status").set("playing");
  },[allReady,isHost]);

  function confirm(){
    var n=parseInt(secretInput);
    if(isNaN(n)||n<0||n>100){setError("Numero de 0 a 100!");return;}
    db.ref("rooms/"+p.roomCode+"/players/"+p.uid+"/secret").set(n);
    db.ref("rooms/"+p.roomCode+"/players/"+p.uid+"/ready").set(true);
    setSubmitted(true);
  }

  var tc=TC[me?me.colorIdx||0:0];

  if(submitted){
    return h('div',{style:{maxWidth:500,margin:"0 auto",padding:"30px 20px",textAlign:"center"}},
      h('div',{style:{background:C.card,borderRadius:24,padding:"50px 30px",border:"2px solid "+C.a3+"44",boxShadow:"0 8px 40px rgba(107,203,119,0.3)"}},
        h('div',{style:{fontSize:"4rem",marginBottom:16}},"✅"),
        h('h3',{style:{fontFamily:"'Lilita One',cursive",color:C.a3,fontSize:"1.4rem",marginBottom:12}},"Numero Registrado!"),
        h('p',{style:{color:C.tm,marginBottom:20}},"Aguardando outros jogadores..."),
        h('div',{style:{display:"flex",gap:8,justifyContent:"center",flexWrap:"wrap"}},
          plList.map(function(pl){return h('div',{key:pl.uid,style:{display:"flex",alignItems:"center",gap:6,padding:"8px 14px",borderRadius:10,background:pl.data.ready?C.a3+"22":"rgba(255,255,255,0.05)",border:"1px solid "+(pl.data.ready?C.a3:C.tm)+"33"}},
            h(Av,{id:pl.data.avatar,size:28}),
            h('span',{style:{fontSize:"0.85rem",color:pl.data.ready?C.a3:C.tm}},pl.data.name),
            h('span',null,pl.data.ready?"✅":"⏳")
          );})
        ),
        h('p',{style:{color:C.tm,fontSize:"0.85rem",marginTop:16}},readyCount+"/"+plList.length+" prontos")
      )
    );
  }

  return h('div',{style:{maxWidth:500,margin:"0 auto",padding:"30px 20px",textAlign:"center"}},
    h('h2',{style:{fontFamily:"'Lilita One',cursive",color:C.text,fontSize:"1.5rem",marginBottom:20}},"🤫 Escolha o Numero Secreto"),
    h('div',{style:{background:C.card,borderRadius:24,padding:"40px 30px",border:"2px solid "+tc.s+"44",boxShadow:"0 8px 40px "+tc.glow,animation:"scaleIn 0.4s ease"}},
      h('div',{style:{animation:"float 3s ease-in-out infinite",display:"inline-block",marginBottom:16}},
        h(Av,{id:me?me.avatar:AVS[0].id,size:90,style:{boxShadow:"0 6px 30px "+tc.glow,border:"4px solid "+tc.s}})
      ),
      h('h3',{style:{fontFamily:"'Lilita One',cursive",color:tc.s,fontSize:"1.5rem",marginBottom:8}},me?me.name:""),
      h('p',{style:{color:"#fff",marginBottom:20}},"Escolha um numero de ",h('strong',{style:{color:C.a2}},"0")," a ",h('strong',{style:{color:C.a2}},"100")),
      h('div',{style:{position:"relative",marginBottom:16}},
        h('input',{type:revealed?"number":"password",value:secretInput,onChange:function(e){setSecretInput(e.target.value);setError("");},onKeyDown:function(e){if(e.key==="Enter")confirm();},placeholder:"Seu numero secreto",style:{padding:"18px 60px 18px 22px",borderRadius:16,border:"2px solid "+tc.s+"44",background:"rgba(0,0,0,0.3)",color:"#fff",fontSize:"1.5rem",fontFamily:"'Lilita One',cursive",width:"100%",boxSizing:"border-box",textAlign:"center",outline:"none"}}),
        h('button',{onClick:function(){setRevealed(!revealed);},style:{position:"absolute",right:14,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",fontSize:"1.3rem",cursor:"pointer"}},revealed?"🙈":"👁️")
      ),
      error?h('p',{style:{color:C.a1,fontSize:"0.9rem",marginBottom:10}},error):null,
      h(Btn,{onClick:confirm,color:tc.s,style:{width:"100%",fontSize:"1.1rem"},children:"✅ Confirmar"})

/* ─── MATCH ─── */
function MatchScreen(p){
  var rd=p.roomData,pls=rd?rd.players||{}:{},game=rd?rd.game||{}:{},history=rd?rd.history||{}:{},winners=rd?rd.winners||{}:{};
  var gi=useState(""),nt=useState([]),nn=useState(""),sn=useState(false),sc=useState(false),hn=useState("");
  var guessInput=gi[0],setGuessInput=gi[1],notes=nt[0],setNotes=nt[1],newNote=nn[0],setNewNote=nn[1],showNotes=sn[0],setShowNotes=sn[1],showConf=sc[0],setShowConf=sc[1],hint=hn[0],setHint=hn[1];
  var prevRef=useRef(null);
  var matchups=game.matchups||[],mi=game.currentMatch||0,match=matchups[mi];
  var isHost=rd&&rd.config&&rd.config.hostId===p.uid;

  useEffect(function(){
    var key=mi+"-"+(game.turn||0)+"-"+(game.round||1);
    if(prevRef.current!==key){setHint("");setGuessInput("");prevRef.current=key;}
  },[mi,game.turn,game.round]);

  useEffect(function(){if(winners[mi]){setShowConf(true);setTimeout(function(){setShowConf(false);},5000);}},[winners[mi]]);

  if(!match){
    return h(ResultsScreen,{roomCode:p.roomCode,roomData:rd,uid:p.uid});
  }

  var guesserUid=match[game.turn||0],defenderUid=match[1-(game.turn||0)];
  var guesser=pls[guesserUid]||{},defender=pls[defenderUid]||{};
  var isMyTurn=guesserUid===p.uid;
  var amInMatch=match.indexOf(p.uid)!==-1;
  var tg=TC[guesser.colorIdx||0],td=TC[defender.colorIdx||0];
  var mHistory=history[mi]||[];
  var myHistory=mHistory.filter(function(x){return x.uid===p.uid;});
  var currentWinner=winners[mi];

  function submitGuess(){
    var n=parseInt(guessInput);if(isNaN(n)||n<0||n>100)return;
    var secret=pls[defenderUid]?pls[defenderUid].secret:null;
    var result;
    if(n===secret){result="acertou";}
    else if(n>secret){result="menos";setHint("O numero e menor que "+n);}
    else{result="mais";setHint("O numero e maior que "+n);}
    var entry={uid:guesserUid,guess:n,result:result,round:game.round||1};
    var newHist=mHistory.concat([entry]);
    db.ref("rooms/"+p.roomCode+"/history/"+mi).set(newHist);
    setGuessInput("");
    if(result==="acertou"){db.ref("rooms/"+p.roomCode+"/winners/"+mi).set(guesserUid);}
    else{
      var newTurn=1-(game.turn||0);
      var updates={turn:newTurn};
      if(newTurn===0)updates.round=(game.round||1)+1;
      db.ref("rooms/"+p.roomCode+"/game").update(updates);
    }
  }

  function nextMatch(){
    var nextMi=mi+1;
    if(nextMi>=matchups.length){db.ref("rooms/"+p.roomCode+"/config/status").set("results");}
    else{db.ref("rooms/"+p.roomCode+"/game").update({currentMatch:nextMi,turn:0,round:1});}
  }

  function addNote(){if(!newNote.trim())return;setNotes(notes.concat([{text:newNote.trim(),round:game.round||1}]));setNewNote("");}

  // WINNER
  if(currentWinner){
    var w=pls[currentWinner]||{},tw=TC[w.colorIdx||0],secret=pls[defenderUid]?pls[defenderUid].secret:"?";
    return h('div',{style:{maxWidth:500,margin:"0 auto",padding:"30px 20px",textAlign:"center"}},
      h(Confetti,{active:showConf}),
      h('div',{style:{animation:"titleBounce 1s ease infinite",display:"inline-block",marginBottom:16}},
        h(Av,{id:w.avatar,size:100,style:{boxShadow:"0 0 50px "+tw.glow,border:"5px solid "+C.a2}})
      ),
      h('h2',{style:{fontFamily:"'Lilita One',cursive",color:tw.s,fontSize:"2rem",marginBottom:8}},w.name+" VENCEU! 🏆"),
      h('p',{style:{color:C.tm,marginBottom:6}},"O numero secreto era:"),
      h('div',{style:{display:"inline-flex",alignItems:"center",justifyContent:"center",width:80,height:80,borderRadius:"50%",background:tw.bg,fontSize:"2rem",fontFamily:"'Lilita One',cursive",color:"#fff",boxShadow:"0 0 40px "+tw.glow,marginBottom:20}},secret),
      isHost?h(Btn,{onClick:nextMatch,color:C.a2,style:{width:"100%",fontSize:"1.1rem"},children:mi+1<matchups.length?"➡️ PROXIMA PARTIDA":"🏆 VER RESULTADOS"}):
        h('p',{style:{color:C.tm,fontSize:"0.9rem",animation:"pulse 2s infinite"}},"⏳ Aguardando host...")
    );
  }

  // SPECTATOR
  if(!amInMatch){
    return h('div',{style:{maxWidth:500,margin:"0 auto",padding:"30px 20px",textAlign:"center"}},
      h('h3',{style:{fontFamily:"'Lilita One',cursive",color:C.tm,fontSize:"1.2rem",marginBottom:20}},"👀 Assistindo"),
      h('div',{style:{display:"flex",alignItems:"center",justifyContent:"center",gap:12,marginBottom:20}},
        h(Av,{id:guesser.avatar,size:50,style:{border:"3px solid "+tg.s}}),
        h('span',{style:{fontFamily:"'Lilita One',cursive",color:C.tm}},"vs"),
        h(Av,{id:defender.avatar,size:50,style:{border:"3px solid "+td.s}})
      ),
      h(Badge,{color:C.a2,children:"Rodada "+(game.round||1)}),
      h('p',{style:{color:C.tm,marginTop:12}},"Vez de ",h('strong',{style:{color:tg.s}},guesser.name))
    );
  }

  // MY TURN / WAITING
  return h('div',{style:{maxWidth:550,margin:"0 auto",padding:"20px"}},
    h('div',{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16,flexWrap:"wrap",gap:8}},
      h('div',{style:{display:"flex",alignItems:"center",gap:6}},
        h(Av,{id:guesser.avatar,size:32,style:{border:"2px solid "+tg.s}}),
        h('div',{style:{padding:"5px 10px",borderRadius:8,background:tg.bg,fontFamily:"'Lilita One',cursive",color:"#fff",fontSize:"0.85rem"}},guesser.name),
        h('span',{style:{color:C.tm}},"vs"),
        h(Av,{id:defender.avatar,size:32,style:{border:"2px solid "+td.s}}),
        h('div',{style:{padding:"5px 10px",borderRadius:8,background:td.bg,fontFamily:"'Lilita One',cursive",color:"#fff",fontSize:"0.85rem"}},defender.name)
      ),
      h(Badge,{color:C.a2,children:"Rodada "+(game.round||1)})
    ),
    isMyTurn?
      h('div',{style:{background:C.card,borderRadius:20,padding:"28px 22px",border:"2px solid "+tg.s+"33",boxShadow:"0 6px 30px "+tg.glow,marginBottom:16}},
        h('h3',{style:{fontFamily:"'Lilita One',cursive",color:tg.s,fontSize:"1.15rem",marginBottom:4}},"🎯 Sua vez!"),
        h('p',{style:{color:C.tm,fontSize:"0.9rem",marginBottom:16}},"Adivinha o numero de "+defender.name+" (0-100)"),
        h('div',{style:{display:"flex",gap:10,marginBottom:hint?14:0}},
          h('input',{type:"number",value:guessInput,onChange:function(e){setGuessInput(e.target.value);},placeholder:"?",min:0,max:100,onKeyDown:function(e){if(e.key==="Enter")submitGuess();},style:{flex:1,padding:16,borderRadius:14,border:"2px solid "+tg.s+"44",background:"rgba(0,0,0,0.3)",color:"#fff",fontSize:"1.8rem",fontFamily:"'Lilita One',cursive",textAlign:"center",outline:"none"}}),
          h(Btn,{onClick:submitGuess,color:tg.s,style:{fontSize:"1.3rem",padding:"14px 24px"},children:"✓"})
        ),
        hint?h('div',{style:{padding:"12px 16px",borderRadius:10,background:hint.indexOf("menor")!==-1?C.a1+"15":C.a4+"15",border:"1px solid "+(hint.indexOf("menor")!==-1?C.a1:C.a4)+"33",color:hint.indexOf("menor")!==-1?C.a1:C.a4,fontWeight:700,fontSize:"0.95rem"}},"💡 "+hint):null
      ):
      h('div',{style:{background:C.card,borderRadius:20,padding:"36px 22px",border:"2px solid "+C.tm+"22",marginBottom:16,textAlign:"center"}},
        h('div',{style:{fontSize:"2rem",marginBottom:8}},"⏳"),
        h('h3',{style:{fontFamily:"'Lilita One',cursive",color:C.tm,fontSize:"1.1rem"}},"Vez de "+guesser.name),
        h('p',{style:{color:C.tm,fontSize:"0.85rem",animation:"pulse 2s infinite"}},"Aguardando palpite...")
      ),
    myHistory.length>0?h('div',{style:{background:C.sf,borderRadius:14,padding:"12px 16px",marginBottom:12,border:"1px solid rgba(255,255,255,0.06)"}},
      h('h4',{style:{fontFamily:"'Lilita One',cursive",color:C.a2,fontSize:"0.85rem",marginBottom:8}},"📊 Seus Palpites"),
      h('div',{style:{display:"flex",flexWrap:"wrap",gap:6}},
        myHistory.map(function(g,i){return h('span',{key:i,style:{padding:"5px 10px",borderRadius:8,background:g.result==="menos"?C.a1+"22":C.a4+"22",color:g.result==="menos"?C.a1:C.a4,fontSize:"0.85rem",fontWeight:700}},(g.result==="menos"?"↓":"↑")+g.guess);})
      )

    h('div',{style:{background:C.sf,borderRadius:14,padding:"12px 16px",border:"1px solid rgba(255,255,255,0.06)"}},
      h('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}},
        h('h4',{style:{fontFamily:"'Lilita One',cursive",color:C.a5,fontSize:"0.85rem",margin:0}},"📝 Anotacoes"),
        notes.length>0?h('button',{onClick:function(){setShowNotes(!showNotes);},style:{background:"none",border:"none",color:C.a5,cursor:"pointer",fontSize:"0.75rem"}},showNotes?"Esconder":"Mostrar ("+notes.length+")"):null
      ),

        h(Btn,{onClick:addNote,color:C.a5,style:{padding:"10px 16px",fontSize:"0.85rem"},children:"+"})
      ),
      showNotes?notes.map(function(n,i){return h('div',{key:i,style:{padding:"6px 10px",borderRadius:6,background:"rgba(255,255,255,0.04)",marginTop:4,display:"flex",justifyContent:"space-between",fontSize:"0.8rem",color:C.tm}},h('span',null,n.text),h('span',{style:{color:"rgba(255,255,255,0.2)"}},"R"+n.round));}):null
    )
  );
}

function ResultsScreen(p){
  var rd=p.roomData,pls=rd?rd.players||{}:{},history=rd?rd.history||{}:{},winners=rd?rd.winners||{}:{};
  var cf=useState(true);var showConf=cf[0];
  useEffect(function(){setTimeout(function(){cf[1](false);},5000);},[]);
  var isHost=rd&&rd.config&&rd.config.hostId===p.uid;

  var stats=Object.keys(pls).map(function(pid){
    var pl=pls[pid],totalGuesses=0,wins=0;
    Object.values(history).forEach(function(mh){
      var mine=(mh||[]).filter(function(x){return x.uid===pid;});
      totalGuesses+=mine.length;
    });
    Object.values(winners).forEach(function(w){if(w===pid)wins++;});
    return{pid:pid,name:pl.name,avatar:pl.avatar,colorIdx:pl.colorIdx,wins:wins,totalGuesses:totalGuesses,avg:wins>0?(totalGuesses/wins).toFixed(1):"-"};
  }).sort(function(a,b){return b.wins-a.wins;});

  function playAgain(){
    var pls2={};
    Object.keys(pls).forEach(function(pid){var pl=pls[pid];pls2[pid]={name:pl.name,avatar:pl.avatar,colorIdx:pl.colorIdx,ready:false};});
    db.ref("rooms/"+p.roomCode).update({config:Object.assign({},rd.config,{status:"lobby"}),players:pls2,game:null,history:null,winners:null});
  }

  return h('div',{style:{maxWidth:550,margin:"0 auto",padding:"30px 20px"}},
    h(Confetti,{active:showConf}),
    h('div',{style:{textAlign:"center",marginBottom:24}},
      h('div',{style:{fontSize:"4rem",marginBottom:8}},"🏆"),
      h('h2',{style:{fontFamily:"'Lilita One',cursive",fontSize:"2rem",background:"linear-gradient(135deg,#ffd93d,#ff6b6b)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}},"RESULTADOS FINAIS")
    ),
    h('div',{style:{display:"flex",flexDirection:"column",gap:12,marginBottom:24}},
      stats.map(function(pl,i){
        var tc=TC[pl.colorIdx||0];
        return h('div',{key:pl.pid,style:{display:"flex",alignItems:"center",gap:12,padding:"14px 18px",borderRadius:16,background:i===0?tc.bg:C.sf,border:i===0?"none":"1px solid rgba(255,255,255,0.06)",boxShadow:i===0?"0 6px 30px "+tc.glow:"none",animation:"fadeUp 0.4s "+(i*0.1)+"s both"}},
          h('div',{style:{position:"relative"}},
            h(Av,{id:pl.avatar,size:50,style:{border:i===0?"3px solid "+C.a2:"2px solid "+tc.s}}),
            i===0?h('span',{style:{position:"absolute",top:-8,right:-8,fontSize:"1.2rem"}},"👑"):null
          ),
          h('div',{style:{flex:1}},
            h('div',{style:{fontFamily:"'Lilita One',cursive",color:"#fff",fontSize:"1.05rem"}},pl.name+(pl.pid===p.uid?" (Voce)":"")),
            h('div',{style:{color:"rgba(255,255,255,0.6)",fontSize:"0.75rem"}},pl.totalGuesses+" palpites - Media: "+pl.avg)
          ),
          h('div',{style:{fontFamily:"'Lilita One',cursive",fontSize:"1.1rem",color:i===0?"#fff":tc.s,textAlign:"right"}},pl.wins+" "+(pl.wins===1?"vitoria":"vitorias"))
        );
      })
    ),
    isHost?h(Btn,{onClick:playAgain,color:C.a2,style:{width:"100%",fontSize:"1.15rem",padding:"16px"},children:"🔄 JOGAR NOVAMENTE"}):
      h('p',{style:{textAlign:"center",color:C.tm,fontSize:"0.9rem"}},"O host pode iniciar nova rodada")
  );
}

/* ─── APP ─── */
function App(){
  var uid=useState(null),scr=useState("welcome"),sm=useState(null),rc=useState(null),rd=useState(null),ar=useState(false);
  var myUid=uid[0],setUid=uid[1],screen=scr[0],setScreen=scr[1],setupMode=sm[0],setSetupMode=sm[1],roomCode=rc[0],setRoomCode=rc[1],roomData=rd[0],setRoomData=rd[1],authReady=ar[0],setAuthReady=ar[1];

  useEffect(function(){
    auth.onAuthStateChanged(function(user){
      if(user){setUid(user.uid);setAuthReady(true);}
      else{auth.signInAnonymously();}
    });
  },[]);

  useEffect(function(){
    if(!roomCode)return;
    var ref=db.ref("rooms/"+roomCode);
    var cb=ref.on("value",function(snap){var data=snap.val();if(data)setRoomData(data);});
    return function(){ref.off("value",cb);};
  },[roomCode]);

  useEffect(function(){
    if(!authReady)return;
    var saved=sessionStorage.getItem("advinha_room");
    if(saved){setRoomCode(saved);setScreen("room");}
  },[authReady]);

  useEffect(function(){if(roomCode)sessionStorage.setItem("advinha_room",roomCode);},[roomCode]);

  function handleRoomReady(code){setRoomCode(code);setScreen("room");}
  function handleLeave(){
    if(roomCode&&myUid){db.ref("rooms/"+roomCode+"/players/"+myUid).remove();}
    setRoomCode(null);setRoomData(null);setScreen("welcome");sessionStorage.removeItem("advinha_room");
  }

  if(!authReady)return h('div',{style:{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center"}},h(Spinner));

  var status=roomData&&roomData.config?roomData.config.status:null;

  return h('div',{style:{minHeight:"100vh",background:C.bg,position:"relative",overflow:"auto"}},
    h(Orbs),
    h('div',{style:{position:"relative",zIndex:1,paddingBottom:40}},
      screen==="welcome"?h(Welcome,{onCreateRoom:function(){setSetupMode("create");setScreen("setup");},onJoinRoom:function(){setSetupMode("join");setScreen("setup");}}):null,
      screen==="setup"?h(Setup,{mode:setupMode,uid:myUid,onReady:handleRoomReady,onBack:function(){setScreen("welcome");}}):null,
      screen==="room"?h(React.Fragment,null,
        roomCode?h('div',{style:{textAlign:"right",padding:"8px 16px 0"}},
          h('button',{onClick:handleLeave,style:{background:"none",border:"none",color:C.tm,cursor:"pointer",fontSize:"0.8rem"}},"🚪 Sair")
        ):null,
        (!status||status==="lobby")?h(Lobby,{roomCode:roomCode,roomData:roomData,uid:myUid}):null,
        status==="secrets"?h(SecretScreen,{roomCode:roomCode,roomData:roomData,uid:myUid}):null,
        status==="playing"?h(MatchScreen,{roomCode:roomCode,roomData:roomData,uid:myUid}):null,
        status==="results"?h(ResultsScreen,{roomCode:roomCode,roomData:roomData,uid:myUid}):null
      ):null
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
</body>
</html>
